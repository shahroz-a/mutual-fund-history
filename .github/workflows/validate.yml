name: Validate Dataset

on:
  pull_request:
  push:
    paths:
      - "data/**"
      - "docs/**"
      - "scripts/*.py"
      - ".github/workflows/validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate compressed CSV files
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate dataset
        run: |
          mapfile -t DATA_FILES < <(find data -name '*.csv.gz' ! -name 'historical.csv.gz' | sort)
          python scripts/validation.py \
            --input "${DATA_FILES[@]}" \
            --report-json releases/validation-report.json \
            --report-md releases/validation-report.md

      - name: Upload validation reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: validation-reports
          path: |
            releases/validation-report.json
            releases/validation-report.md
