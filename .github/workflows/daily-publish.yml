name: Daily Dataset Publish

on:
  schedule:
    # 21:00 IST daily, after Indian market close and NAV publication window.
    - cron: "30 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-dataset-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Validate, checksum, release
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Import generated private dataset archive
        env:
          NAV_DATASET_ARCHIVE_URL: ${{ secrets.NAV_DATASET_ARCHIVE_URL }}
          NAV_DATASET_ARCHIVE_TOKEN: ${{ secrets.NAV_DATASET_ARCHIVE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NAV_DATASET_ARCHIVE_URL}" ]; then
            echo "No generated private dataset archive configured; validating existing public data."
            exit 0
          fi

          archive="${RUNNER_TEMP}/nav-dataset-archive"
          if [ -n "${NAV_DATASET_ARCHIVE_TOKEN}" ]; then
            curl -fsSL -H "Authorization: Bearer ${NAV_DATASET_ARCHIVE_TOKEN}" "${NAV_DATASET_ARCHIVE_URL}" -o "${archive}"
          else
            curl -fsSL "${NAV_DATASET_ARCHIVE_URL}" -o "${archive}"
          fi

          python scripts/import_dataset_archive.py "${archive}" --data-dir data

      - name: Validate dataset and update README
        run: |
          mapfile -t ARCHIVE_FILES < <(find data/Year -name '*.csv' | sort)
          python scripts/validation.py --input data/latest.csv "${ARCHIVE_FILES[@]}" --report-json releases/validation-report.json --report-md releases/validation-report.md --update-readme README.md

      - name: Generate checksums and notes
        id: metadata
        run: |
          mkdir -p releases
          python scripts/generate_checksums.py
          RELEASE_DATE="$(date -u +%Y-%m-%d)"
          TAG="nav-$(date -u +%Y%m%d)"
          {
            echo "Daily mutual fund NAV archive for ${RELEASE_DATE}."
            echo ""
            echo "This release contains generated public CSV dataset files from the repository data directory."
            echo ""
            echo "Assets:"
            echo "- latest.csv"
            echo "- checksums.sha256"
            echo "- validation-report.md"
            echo "- validation-report.json"
          } > releases/release-notes.md
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=NAV archive ${RELEASE_DATE}" >> "$GITHUB_OUTPUT"

      - name: Commit generated metadata
        run: |
          git config user.name "Shahroz"
          git config user.email "shahrozmails@gmail.com"
          git add README.md data/latest.csv data/Year releases/checksums.sha256 releases/validation-report.json releases/validation-report.md
          if git diff --cached --quiet; then
            echo "No metadata changes to commit."
          else
            git commit -m "Publish daily dataset metadata"
            git push
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.metadata.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.metadata.outputs.tag }}" data/latest.csv releases/checksums.sha256 releases/validation-report.md releases/validation-report.json --clobber
            exit 0
          fi

          gh release create "${{ steps.metadata.outputs.tag }}" data/latest.csv releases/checksums.sha256 releases/validation-report.md releases/validation-report.json --title "${{ steps.metadata.outputs.title }}" --notes-file releases/release-notes.md
